<!-- components/topbar.html - Top bar component -->
<div class="topbar-inner">
  <div class="topbar-left">
    <h2 id="topbar-title">Tổng Quan</h2>
    <p id="topbar-subtitle">Xem tổng quan hoạt động nhà hàng hôm nay</p>
  </div>
  <div class="topbar-right">
    <div class="topbar-clock">
      <div class="time" id="topbarTime">00:00:00</div>
      <div class="date" id="topbarDate">--/--/----</div>
    </div>
    <div class="topbar-user">
      <div class="user-avatar">QT</div>
      <div class="user-info">
        <div class="name">Quản Trị Viên</div>
        <div class="role">Administrator</div>
      </div>
    </div>
  </div>
</div>
